name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check ravenrag/ tests/

      - name: Check formatting
        run: uv run ruff format --check ravenrag/ tests/

      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short -m "not integration" --cov=ravenrag --cov-report=term-missing --cov-fail-under=75

      - name: Run integration tests
        run: uv run pytest tests/ -v --tb=short -m "integration"
